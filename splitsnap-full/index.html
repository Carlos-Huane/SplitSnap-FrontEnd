<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitSnap - Interactive Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f0f;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== TOP BAR ===== */
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    z-index: 100;
  }
  #top-bar .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #top-bar .brand .logo {
    width: 28px; height: 28px;
    background: #F97316;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 14px;
  }
  #top-bar .brand span {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }
  .view-toggle {
    display: flex;
    background: #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
  }
  .view-toggle button {
    padding: 7px 16px;
    border: none;
    background: transparent;
    color: #888;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .view-toggle button.active {
    background: #F97316;
    color: #fff;
  }
  .view-toggle button:hover:not(.active) {
    color: #ccc;
  }
  #screen-name {
    color: #888;
    font-size: 12px;
    min-width: 150px;
    text-align: center;
  }

  /* ===== MAIN AREA ===== */
  #main-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ===== PHONE FRAME (MOBILE) ===== */
  #phone-frame {
    position: relative;
    width: 375px;
    height: 812px;
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 0 0 8px #333, 0 0 0 10px #222, 0 25px 60px rgba(0,0,0,0.5);
    background: #fff;
    transform-origin: top center;
  }
  body.desktop-mode #phone-frame { display: none; }

  /* ===== DESKTOP FRAME ===== */
  #desktop-frame {
    position: relative;
    width: 1440px;
    height: 900px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 0 4px #333, 0 25px 60px rgba(0,0,0,0.5);
    background: #fff;
    transform-origin: top center;
    display: none;
  }
  body.desktop-mode #desktop-frame { display: block; }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 10;
  }
  .screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ===== HOTSPOTS ===== */
  .hotspot {
    position: absolute;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
    z-index: 20;
  }
  .hotspot:hover { background: rgba(249,115,22,0.08); }
  .hotspot:active { background: rgba(249,115,22,0.18); }

  /* ===== NAV BAR ===== */
  #nav-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
    padding: 10px 20px;
    background: #1a1a1a;
    border-top: 1px solid #333;
    flex-shrink: 0;
  }
  .nav-pill {
    padding: 5px 10px;
    border-radius: 16px;
    border: 1px solid #444;
    background: #222;
    color: #999;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .nav-pill:hover { border-color: #F97316; color: #F97316; }
  .nav-pill.active { background: #F97316; color: #fff; border-color: #F97316; }

  /* ===== RESPONSIVE SCALING ===== */
  @media (max-height: 950px) {
    body:not(.desktop-mode) #phone-frame { transform: scale(0.88); }
  }
  @media (max-height: 820px) {
    body:not(.desktop-mode) #phone-frame { transform: scale(0.75); }
  }
  body.desktop-mode #desktop-frame {
    transform: scale(0.68);
  }
  @media (min-width: 1500px) {
    body.desktop-mode #desktop-frame { transform: scale(0.78); }
  }
  @media (min-width: 1800px) {
    body.desktop-mode #desktop-frame { transform: scale(0.88); }
  }
  @media (max-width: 1100px) {
    body.desktop-mode #desktop-frame { transform: scale(0.55); }
  }

  /* Transition overlay */
  .flash {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.04);
    pointer-events: none;
    z-index: 50;
    animation: flash 0.3s ease-out;
  }
  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>

<script>
const screens = [
  { id: 'splash',           label: 'Splash' },
  { id: 'login',            label: 'Login' },
  { id: 'register',         label: 'Registro' },
  { id: 'dashboard',        label: 'Dashboard' },
  { id: 'group-detail',     label: 'Grupo' },
  { id: 'add-expense',      label: 'Gasto' },
  { id: 'scan-receipt',     label: 'Escanear' },
  { id: 'debt-summary',     label: 'Deudas' },
  { id: 'crear-grupo',      label: 'Crear grupo' },
  { id: 'invitar-miembros', label: 'Invitar' },
  { id: 'revisar-items',    label: 'Revisar' },
  { id: 'perfil',           label: 'Perfil' },
  { id: 'empty-state',      label: 'Vacio' },
];

let currentScreen = 'splash';
let currentView = 'mobile'; // 'mobile' or 'desktop'

// Build nav pills
const navBar = document.getElementById('nav-bar');
screens.forEach(s => {
  const pill = document.createElement('button');
  pill.className = 'nav-pill' + (s.id === 'splash' ? ' active' : '');
  pill.textContent = s.label;
  pill.dataset.screen = s.id;
  pill.onclick = () => goTo(s.id);
  navBar.appendChild(pill);
});

function goTo(screenId) {
  if (screenId === currentScreen) return;

  // Deactivate all screens in current frame
  const prefix = currentView === 'mobile' ? 'm-' : 'd-';
  const curEl = document.getElementById(prefix + currentScreen);
  if (curEl) curEl.classList.remove('active');

  // Activate new screen
  const nextEl = document.getElementById(prefix + screenId);
  if (nextEl) nextEl.classList.add('active');

  currentScreen = screenId;

  // Update pills
  document.querySelectorAll('.nav-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.screen === screenId);
  });

  // Update label
  const info = screens.find(s => s.id === screenId);
  document.getElementById('screen-name').textContent = info ? info.label : screenId;
}

function setView(view) {
  currentView = view;
  document.body.classList.toggle('desktop-mode', view === 'desktop');
  document.getElementById('btn-mobile').classList.toggle('active', view === 'mobile');
  document.getElementById('btn-desktop').classList.toggle('active', view === 'desktop');

  // Sync: deactivate all, activate current in new frame
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const prefix = view === 'mobile' ? 'm-' : 'd-';
  const el = document.getElementById(prefix + currentScreen);
  if (el) el.classList.add('active');
}

// Auto-advance splash
setTimeout(() => {
  if (currentScreen === 'splash') goTo('login');
}, 2500);

// Keyboard navigation
document.addEventListener('keydown', e => {
  const idx = screens.findIndex(s => s.id === currentScreen);
  if (e.key === 'ArrowRight' && idx < screens.length - 1) goTo(screens[idx + 1].id);
  if (e.key === 'ArrowLeft' && idx > 0) goTo(screens[idx - 1].id);
  if (e.key === '1') setView('mobile');
  if (e.key === '2') setView('desktop');
});
</script>
