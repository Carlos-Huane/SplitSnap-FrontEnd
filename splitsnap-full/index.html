<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitSnap - Prototipo Interactivo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar */
    .topbar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 56px;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-logo {
      width: 32px;
      height: 32px;
      background: #F97316;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }
    .topbar-title {
      font-size: 16px;
      font-weight: 600;
    }
    .topbar-subtitle {
      font-size: 12px;
      color: #888;
    }

    /* Device Toggle */
    .device-toggle {
      display: flex;
      background: #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }
    .device-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .device-btn.active {
      background: #F97316;
      color: #fff;
    }
    .device-btn:hover:not(.active) {
      color: #ccc;
    }

    /* Layout */
    .app {
      display: flex;
      margin-top: 56px;
      height: calc(100vh - 56px);
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      padding: 16px 0;
    }
    .sidebar-section {
      margin-bottom: 4px;
    }
    .sidebar-section-title {
      padding: 12px 20px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sidebar-item {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover {
      background: #222;
      color: #fff;
    }
    .sidebar-item.active {
      background: #1f1a14;
      color: #F97316;
      border-left-color: #F97316;
    }
    .sidebar-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }
    .sidebar-item.active .dot {
      background: #F97316;
    }

    /* Canvas */
    .canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 40px;
      background: #0f0f0f;
    }
    .screen-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .screen-label {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    .screen-frame {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      position: relative;
    }
    .screen-frame.mobile {
      width: 375px;
      border: 2px solid #2a2a2a;
    }
    .screen-frame.desktop {
      width: 1440px;
      max-width: calc(100vw - 340px);
      border: 2px solid #2a2a2a;
    }
    .screen-frame img {
      width: 100%;
      display: block;
    }

    /* Hotspots */
    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .hotspot:hover {
      background: rgba(249, 115, 22, 0.15);
      outline: 2px solid rgba(249, 115, 22, 0.4);
    }

    /* Navigation Arrows */
    .nav-arrows {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .nav-arrow {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }
    .nav-arrow:hover {
      background: #F97316;
      color: #fff;
      border-color: #F97316;
    }

    /* Keyboard hint */
    .keyboard-hint {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #555;
      display: flex;
      gap: 16px;
    }
    .keyboard-hint kbd {
      background: #2a2a2a;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #3a3a3a;
      font-family: inherit;
      color: #888;
    }
  </style>
</head>

let currentScreen = 'splash';
let currentDevice = 'mobile';
const screenKeys = Object.keys(screens);

function setDevice(device) {
  const s = screens[currentScreen];
  if (device === 'desktop' && !s.desktop) return;
  currentDevice = device;
  document.getElementById('btn-mobile').classList.toggle('active', device === 'mobile');
  document.getElementById('btn-desktop').classList.toggle('active', device === 'desktop');
  renderScreen();
}

function goToScreen(key) {
  if (!screens[key]) return;
  currentScreen = key;
  if (currentDevice === 'desktop' && !screens[key].desktop) {
    currentDevice = 'mobile';
    document.getElementById('btn-mobile').classList.add('active');
    document.getElementById('btn-desktop').classList.remove('active');
  }
  renderScreen();
  renderSidebar();
}

function navigate(dir) {
  const idx = screenKeys.indexOf(currentScreen);
  const newIdx = idx + dir;
  if (newIdx >= 0 && newIdx < screenKeys.length) {
    goToScreen(screenKeys[newIdx]);
  }
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  let lastSection = '';

  for (const [key, screen] of Object.entries(screens)) {
    if (screen.section !== lastSection) {
      lastSection = screen.section;
      html += '<div class="sidebar-section"><div class="sidebar-section-title">' + screen.section + '</div></div>';
    }
    const cls = key === currentScreen ? 'active' : '';
    html += '<div class="sidebar-item ' + cls + '" onclick="goToScreen(\'' + key + '\')">' +
      '<span class="dot"></span>' + screen.name + '</div>';
  }
  sidebar.innerHTML = html;
}

function renderScreen() {
  const canvas = document.getElementById('canvas');
  const screen = screens[currentScreen];
  const isDesktop = currentDevice === 'desktop' && screen.desktop;
  const imgSrc = isDesktop ? screen.desktop : screen.mobile;
  const frameClass = isDesktop ? 'desktop' : 'mobile';
  const dims = isDesktop ? '1440x900' : '375x812';

  let hs = '';
  const hotspots = isDesktop ? (screen.hotspots.desktop || []) : (screen.hotspots.mobile || []);
  for (const h of hotspots) {
    const title = screens[h.target] ? screens[h.target].name : h.target;
    hs += '<div class="hotspot" style="left:' + h.x + '%;top:' + h.y + '%;width:' + h.w + '%;height:' + h.h + '%" onclick="goToScreen(\'' + h.target + '\')" title="Ir a: ' + title + '"></div>';
  }

  canvas.innerHTML =
    '<div class="screen-container" style="display:flex">' +
      '<div class="screen-label">' + screen.section + ' / ' + screen.name + ' — ' + dims + '</div>' +
      '<div class="screen-frame ' + frameClass + '">' +
        '<img src="' + imgSrc + '" alt="' + screen.name + '">' +
        hs +
      '</div>' +
      '<div class="nav-arrows">' +
        '<div class="nav-arrow" onclick="navigate(-1)">&larr;</div>' +
        '<div class="nav-arrow" onclick="navigate(1)">&rarr;</div>' +
      '</div>' +
    '</div>';

  renderSidebar();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'm' || e.key === 'M') setDevice('mobile');
  if (e.key === 'd' || e.key === 'D') setDevice('desktop');
});

renderScreen();
</script>
